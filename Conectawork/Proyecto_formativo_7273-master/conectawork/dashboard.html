<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins';
background:#020617;
color:white;
}

/* SIDEBAR */
.sidebar{
width:220px;
height:100vh;
background:#0f172a;
position:fixed;
padding:20px;
}

.sidebar h2{color:#a78bfa;}

.sidebar ul{padding:0;}

.sidebar li{
list-style:none;
margin:15px 0;
}

.sidebar a{
text-decoration:none;
color:white;
display:block;
transition:0.3s;
}

.sidebar a:hover{
color:#22d3ee;
}

.btn-inicio{
margin-top:20px;
padding:12px;
text-align:center;
border-radius:12px;
background: rgba(255,255,255,0.1);
color:white;
display:block;
text-decoration:none;
transition:0.3s;
}

.btn-inicio:hover{
background: linear-gradient(45deg,#8b5cf6,#22d3ee);
transform:scale(1.05);
}

/* MAIN */
.main{
margin-left:240px;
padding:30px;
}

/* BANNER */
.banner{
height:180px;
border-radius:15px;
background:url('https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=1200&q=60') center/cover;
display:flex;
align-items:end;
padding:20px;
}

.banner h1{
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
}

/* CARDS */
.cards{
display:flex;
gap:20px;
margin-top:20px;
}

.card{
flex:1;
padding:20px;
background:#1e293b;
border-radius:15px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:10px;
}

.btn{
background:linear-gradient(45deg,#8b5cf6,#22d3ee);
padding:10px;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

/* USUARIO */
.usuario-box{
margin-top:10px;
color:#22d3ee;
font-size:14px;
}

/* SMALL BADGE */
.modulo{
margin-top:10px;
font-size:12px;
color:#94a3b8;
}
</style>

<!-- 🔐 PROTECCIÓN -->
<script>
if(localStorage.getItem("login") !== "true"){
    window.location.href = "index.html";
}
</script>

</head>

<body>

<div class="sidebar">

<h2>ConectaWork</h2>

<div class="usuario-box" id="usuarioBox"></div>
<div class="modulo" id="moduloBox"></div>

<a href="jornada.html" class="btn-inicio">🚀 Inicio de jornada</a>

<ul>
<li><a href="novedades.html">📢 Novedades</a></li>
<li><a href="permisos.html">📄 Permisos</a></li>
<li><a href="inasistencias.html">🚫 Inasistencias</a></li>
<li><a href="capacitaciones.html">🎓 Capacitaciones</a></li>

<!-- 👥 EMPLEADOS -->
<li>
<a href="empleados.html" onclick="guardarModulo('empleados')">👥 Empleados</a>
</li>

<li><a href="#" onclick="logout()">🚪 Cerrar sesión</a></li>
</ul>

</div>

<div class="main">

<div class="banner">
<h1 id="bienvenida"></h1>
</div>

<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=800&q=60">
<p>Reuniones virtuales</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=800&q=60">
<p>Trabajo remoto</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=800&q=60">
<p>Capacitación online</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=800&q=60">
<p>Bienestar laboral</p>
</div>

</div>

<h2>Colaboradores</h2>

<button class="btn" onclick="window.location='registro.html'">
Agregar
</button>

<table>
<tr>
<th>Nombre</th>
<th>Cédula</th>
</tr>

<tr>
<td>Juan Pérez</td>
<td>123456</td>
</tr>
</table>

</div>

<!-- 🔥 JS -->
<script>

const usuario = localStorage.getItem("usuario");

document.getElementById("bienvenida").innerText =
"Bienvenido " + usuario + " 💻";

document.getElementById("usuarioBox").innerText =
"Usuario: " + usuario;

// mostrar último módulo visitado
const ultimo = localStorage.getItem("ultimoModulo");

if(ultimo){
document.getElementById("moduloBox").innerText =
"Último módulo: " + ultimo;
}

// guardar módulo
function guardarModulo(modulo){
localStorage.setItem("ultimoModulo", modulo);
}

// logout
function logout(){
localStorage.removeItem("login");
localStorage.removeItem("usuario");
window.location.href = "index.html";
}

</script>

</body>
</html>
