<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConectaWork - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    display:flex;
    height:100vh;
    background:#020617;
}

/* IZQUIERDA */
.left{
    flex:1;
    background:linear-gradient(135deg,#020617,#0f172a);
    position:relative;
    overflow:hidden;
}

.left::before{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:#8b5cf6;
    border-radius:50%;
    filter:blur(120px);
    top:-100px;
    left:-100px;
}

.left::after{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    background:#22d3ee;
    border-radius:50%;
    filter:blur(120px);
    bottom:-100px;
    right:-100px;
}

/* DERECHA */
.right{
    width:420px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#020617;
}

.box{
    width:320px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border-radius:20px;
    padding:40px;
    text-align:center;
    color:white;
    box-shadow:0 0 30px rgba(0,0,0,.4);
}

.box h2{
    margin-bottom:25px;
    color:#a78bfa;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    color:white;
    font-size:15px;
    background:linear-gradient(45deg,#8b5cf6,#22d3ee);
    transition:.3s;
}

button:hover{
    transform:scale(1.03);
}

#error{
    color:#ff6b6b;
    margin-top:15px;
}
</style>

</head>
<body>

<div class="left"></div>

<div class="right">

<div class="box">

<h2>ConectaWork</h2>

<input type="text" id="user" placeholder="Usuario">

<input type="password" id="pass" placeholder="Contraseña">

<button onclick="login()">Iniciar sesión</button>

<p id="error"></p>

</div>

</div>

<script>

function login(){

const usuario=document.getElementById("user").value.trim();

const contraseña=document.getElementById("pass").value.trim();

const error=document.getElementById("error");

if(usuario==="admin" && contraseña==="1234"){

window.location.href="dashboard.html";

}else{

error.textContent="Usuario o contraseña incorrectos.";

}

}

</script>

</body>
</html>
