<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Empleados - ConectaWork</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins';
background:#020617;
color:white;
}

/* CONTENEDOR */
.container{
margin-left:240px;
padding:30px;
}

/* FORMULARIO */
form{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

input{
padding:10px;
border:none;
border-radius:8px;
background:#0f172a;
color:white;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#8b5cf6,#22d3ee);
color:white;
cursor:pointer;
}

/* TABLA */
table{
width:100%;
border-collapse:collapse;
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:12px;
border:1px solid #333;
text-align:center;
}

.delete{
background:red;
padding:5px 10px;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Gestión de Empleados</h1>

<!-- FORMULARIO -->
<form onsubmit="agregarEmpleado(event)">
<input type="text" id="nombre" placeholder="Nombre" required>
<input type="text" id="cedula" placeholder="Cédula" required>
<input type="text" id="cargo" placeholder="Cargo" required>
<button type="submit">Agregar</button>
</form>

<!-- TABLA -->
<table>
<thead>
<tr>
<th>Nombre</th>
<th>Cédula</th>
<th>Cargo</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tablaEmpleados"></tbody>

</table>

</div>

<script src="js/empleados.js"></script>

</body>
</html>
