<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inicio de Jornada</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins';
background:#020617;
color:white;
}

/* SIDEBAR */
.sidebar{
width:220px;
height:100vh;
background:#0f172a;
position:fixed;
padding:20px;
}

.sidebar h2{color:#a78bfa;}

.sidebar ul{
padding:0;
}

.sidebar li{
list-style:none;
margin:15px 0;
}

.sidebar a{
text-decoration:none;
color:white;
display:block;
transition:0.3s;
}

.sidebar a:hover{
color:#22d3ee;
}

/* ACTIVO */
.active{
color:#22d3ee;
font-weight:bold;
}

/* BOTÓN GLASS */
.btn-inicio{
margin-top:20px;
padding:12px;
text-align:center;
border-radius:12px;
background: linear-gradient(45deg,#8b5cf6,#22d3ee);
color:white;
display:block;
}

/* MAIN */
.main{
margin-left:240px;
padding:30px;
}

/* CARD */
.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

/* BOTONES */
.btn{
background:linear-gradient(45deg,#8b5cf6,#22d3ee);
padding:12px;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
margin-right:10px;
}

/* TABLA */
table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

td,th{
padding:12px;
border:1px solid #333;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>ConectaWork</h2>

<a href="jornada.html" class="btn-inicio">
🚀 Inicio de jornada
</a>

<ul>
<li><a href="novedades.html">📢 Novedades</a></li>
<li><a href="permisos.html">📄 Permisos</a></li>
<li><a href="inasistencias.html">🚫 Inasistencias</a></li>
<li><a href="capacitaciones.html">🎓 Capacitaciones</a></li>
<li><a href="dashboard.html">🏠 Volver al dashboard</a></li>
</ul>
</div>

<div class="main">

<h1>Inicio de Jornada</h1>

<div class="card">
<h3>Registro de jornada</h3>

<button class="btn">Marcar inicio</button>
<button class="btn">Marcar fin</button>

</div>

<div class="card">
<h3>Historial de jornada</h3>

<table>
<tr>
<th>Fecha</th>
<th>Hora inicio</th>
<th>Hora fin</th>
</tr>

<tr>
<td>06/05/2026</td>
<td>08:00 AM</td>
<td>05:00 PM</td>
</tr>

</table>

</div>

</div>

</body>
</html>
