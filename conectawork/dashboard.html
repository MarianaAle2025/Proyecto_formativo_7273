<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins';
background:#020617;
color:white;
}

/* SIDEBAR */
.sidebar{
width:220px;
height:100vh;
background:#0f172a;
position:fixed;
padding:20px;
}

.sidebar h2{color:#a78bfa;}

.sidebar ul{
padding:0;
}

.sidebar li{
list-style:none;
margin:15px 0;
}

.sidebar a{
text-decoration:none;
color:white;
display:block;
transition:0.3s;
}

.sidebar a:hover{
color:#22d3ee;
}

/* BOTÓN GLASS */
.btn-inicio{
margin-top:20px;
padding:12px;
text-align:center;
border-radius:12px;
background: rgba(255,255,255,0.1);
backdrop-filter: blur(10px);
border:1px solid rgba(255,255,255,0.2);
color:white;
cursor:pointer;
transition:0.3s;
text-decoration:none;
display:block;
}

.btn-inicio:hover{
background: linear-gradient(45deg,#8b5cf6,#22d3ee);
transform:scale(1.05);
}

/* MAIN */
.main{
margin-left:240px;
padding:30px;
}

/* BANNER */
.banner{
height:180px;
border-radius:15px;
background:url('https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=1200&q=60') center/cover;
display:flex;
align-items:end;
padding:20px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.banner h1{
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
}

/* BOTÓN NORMAL */
.btn{
background:linear-gradient(45deg,#8b5cf6,#22d3ee);
padding:10px;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

/* CARDS */
.cards{
display:flex;
gap:20px;
margin-top:20px;
}

.card{
flex:1;
padding:20px;
background:#1e293b;
border-radius:15px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

/* TABLA */
table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

td,th{
padding:12px;
border:1px solid #333;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>ConectaWork</h2>

<!-- BOTÓN INICIO (AHORA CON LINK) -->
<a href="jornada.html" class="btn-inicio">
🚀 Inicio de jornada
</a>

<ul>
<li><a href="novedades.html">📢 Novedades</a></li>
<li><a href="permisos.html">📄 Permisos</a></li>
<li><a href="inasistencias.html">🚫 Inasistencias</a></li>
<li><a href="capacitaciones.html">🎓 Capacitaciones</a></li>
</ul>
</div>

<div class="main">

<!-- BANNER -->
<div class="banner">
<h1>Bienvenido a tu espacio de trabajo 💻</h1>
</div>

<!-- CARDS -->
<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=800&q=60">
<p>Reuniones virtuales</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=800&q=60">
<p>Trabajo remoto</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=800&q=60">
<p>Capacitación online</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=800&q=60">
<p>Bienestar laboral</p>
</div>

</div>

<h2>Colaboradores</h2>

Agregar
</button>

<th>Nombre</th>

</tr>

</table>

</div>

</body>
</html>
