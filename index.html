<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - ConectaWork</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    height:100vh;
    display:flex;
}

/* IZQUIERDA */
.left{
    width:60%;
    background: linear-gradient(135deg,#020617,#0f172a);
    position:relative;
    border-right:1px solid rgba(255,255,255,0.05);
}

.left::before{
    content:"";
    position:absolute;
    width:500px;height:500px;
    background:#8b5cf6;
    filter:blur(120px);
    top:-100px;left:-100px;
}

.left::after{
    content:"";
    position:absolute;
    width:400px;height:400px;
    background:#22d3ee;
    filter:blur(120px);
    bottom:-100px;right:-100px;
}

/* DERECHA */
.right{
    width:40%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#020617;
    position:relative;
}

/* LINEA */
.right::before{
    content:"";
    position:absolute;
    left:0;
    width:2px;
    height:80%;
    background:linear-gradient(#8b5cf6,#22d3ee);
    opacity:0.5;
}

/* CAJA */
.box{
    display:flex;
    flex-direction:column;
    align-items:center;
    background:rgba(255,255,255,0.08);
    padding:40px;
    border-radius:25px;
    backdrop-filter:blur(25px);
    box-shadow:0 0 40px rgba(0,0,0,0.6);
    color:white;
    text-align:center;
    width:320px;
    transform: translateX(20px);
}

.box h2{color:#a78bfa;}

input{
    width:80%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
}

button{
    width:80%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#8b5cf6,#22d3ee);
    color:white;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

.error{color:red;}
</style>
</head>

<body>

<div class="left"></div>

<div class="right">
<div class="box">
<h2>ConectaWork</h2>

<input id="user" placeholder="usuario">
<input id="pass" type="password" placeholder="contraseña">

<button onclick="login()">INICIAR SESIÓN</button>

<p id="error" class="error"></p>
</div>
</div>

<script>
function login(){
if(user.value=="admin" && pass.value=="1234"){
window.location="dashboard.html";
}else{
error.innerText="Error: Verifica las credenciales";
}
}
</script>

</body>
</html>
